<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>잇데이 로그인 완료</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; background:linear-gradient(135deg,#fef2f2,#fee2e2); }
    .box { background:#fff; padding:32px; border-radius:20px; box-shadow:0 8px 32px rgba(0,0,0,0.08); text-align:center; max-width:320px; }
    h1 { font-size:18px; margin:0 0 8px; color:#222; }
    p { color:#666; font-size:13px; margin:0; }
    .spinner { width:32px; height:32px; border:3px solid #F18091; border-top-color:transparent; border-radius:50%; animation:spin 0.8s linear infinite; margin:16px auto; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .error { color:#c62828; }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <h1 id="title">로그인 완료 중…</h1>
    <p id="msg">잠시만 기다려주세요</p>
  </div>
  <script>
    (function () {
      try {
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const provider = params.get('provider') || 'oauth';
        const err = params.get('error');
        if (err) {
          document.getElementById('title').textContent = '로그인 실패';
          document.getElementById('title').className = 'error';
          document.getElementById('msg').textContent = decodeURIComponent(err);
          return;
        }
        if (!token) {
          document.getElementById('title').textContent = '잘못된 접근';
          document.getElementById('msg').textContent = '토큰이 누락됐어요';
          return;
        }
        // 환경 자동 감지 · hostname + pathname 둘 다 검사 (서브패스 포함)
        // nopo-lab.github.io/itdasy-frontend-test-yeunjun/ → staging
        // nopo-lab.github.io/itdasy-frontend/ → prod
        const fullUrl = window.location.hostname + window.location.pathname;
        const isLocal = /localhost|127\.0\.0\.1/.test(window.location.hostname);
        const isStaging = /staging|test-yeunjun/.test(fullUrl);
        const env = isLocal ? 'local' : (isStaging ? 'staging' : 'prod');
        const key = 'itdasy_token::' + env;
        localStorage.setItem(key, token);
        // 보안 강화 — 환경별 분기 한쪽만 저장 (cross-env 토큰 누설 방지).
        // 혹시 남아있는 다른 환경 키는 명시적으로 삭제.
        try {
          if (env === 'staging') {
            localStorage.removeItem('itdasy_token::prod');
          } else if (env === 'prod') {
            localStorage.removeItem('itdasy_token::staging');
          }
        } catch(_e) { void _e; }
        // URL 정리 (토큰이 히스토리에 남지 않도록)
        history.replaceState({}, '', window.location.pathname);
        document.getElementById('title').textContent = '✓ 로그인 완료!';
        document.getElementById('msg').textContent = provider + ' 계정으로 로그인됐어요';
        // 서브패스 (/itdasy-frontend-test-yeunjun/) 대응 — 같은 디렉토리의 index.html 로
        setTimeout(() => { window.location.href = 'index.html'; }, 800);
      } catch (e) {
        document.getElementById('title').textContent = '오류';
        document.getElementById('msg').textContent = String(e.message || e);
      }
    })();
  </script>
</body>
</html>
