<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DM 봇 진단</title>
<style>
  body { font-family: -apple-system, sans-serif; padding: 20px; max-width: 480px; margin: 0 auto; background: #f7f7f9; font-size: 14px; }
  h1 { font-size: 18px; color: #B8385A; margin-bottom: 12px; }
  .row { padding: 10px 12px; margin: 6px 0; background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
  .label { font-weight: 700; color: #555; }
  .ok { color: #059669; font-weight: 700; }
  .err { color: #dc2626; font-weight: 700; }
  .warn { color: #d97706; font-weight: 700; }
  pre { background: #f3f4f6; padding: 8px; border-radius: 6px; overflow-x: auto; font-size: 11px; white-space: pre-wrap; word-break: break-all; }
  .btn { display: block; width: 100%; padding: 12px; margin-top: 10px; background: #F18091; color: #fff; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>
<h1>📥 DM 자동응답 진단</h1>
<button class="btn" id="copyAllBtn" style="background:#0d9488;margin-bottom:6px;">📋 진단 결과 전체 복사</button>
<div id="results"></div>
<button class="btn" id="subscribeBtn" style="background:#dc2626;">🔔 IG 계정 webhook 구독 활성화 (제일 먼저!)</button>
<div id="subscribeResult" style="margin-top:8px;"></div>
<button class="btn" id="claimPageIdBtn" style="background:#7c3aed;">📌 webhook recipient page_id 등록 (매칭 실패 시)</button>
<div id="claimResult" style="margin-top:8px;"></div>
<button class="btn" id="recentBtn" style="background:#7c3aed;">🔍 최근 webhook 이벤트 보기</button>
<div id="recentEvents" style="margin-top:8px;"></div>
<button class="btn" id="syncIdBtn" style="background:#3b82f6;">🔄 인스타 user_id 강제 동기화</button>
<button class="btn" id="enableBtn" style="background:#059669;">⚡ DM 자동응답 ON 시키기</button>
<button class="btn" onclick="location.reload()">다시 진단</button>
<button class="btn" style="background:#888;" onclick="location.href='./'">잇데이로</button>
<script>
document.getElementById('claimPageIdBtn').addEventListener('click', async () => {
  const t = localStorage.getItem('itdasy_token::staging') || localStorage.getItem('itdasy_token::prod') || localStorage.getItem('itdasy_token');
  if (!t) { alert('토큰 없음'); return; }
  const box = document.getElementById('claimResult');
  // recent-events 에서 외부 sender 의 webhook 자동 추출 (is_echo 아닌 것)
  let pageId = '';
  try {
    const res = await fetch('https://itdasy-backend-staging-644329093453.asia-northeast3.run.app/instagram/dm-reply/recent-events?limit=20', {
      headers: { 'Authorization': 'Bearer ' + t },
    });
    const data = await res.json();
    for (const ev of (data.events || [])) {
      if (ev.stage === 'webhook_received' && ev.body_preview && ev.body_preview.indexOf('"is_echo":true') === -1) {
        const m = ev.body_preview.match(/"recipient":\{"id":"(\d+)"/);
        if (m) { pageId = m[1]; break; }
      }
    }
  } catch (e) { /* ignore */ }
  if (!pageId) {
    pageId = prompt('webhook 의 recipient page_id 를 입력하세요 (자동 추출 실패):', '17841446473367347');
  } else {
    pageId = prompt('자동 감지된 page_id 등록할까요?', pageId);
  }
  if (!pageId || !/^\d+$/.test(pageId)) { alert('유효한 page_id 가 아니에요'); return; }
  box.innerHTML = '<pre>등록 중…</pre>';
  try {
    const res = await fetch('https://itdasy-backend-staging-644329093453.asia-northeast3.run.app/instagram/dm-reply/claim-page-id', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + t, 'Content-Type': 'application/json' },
      body: JSON.stringify({ page_id: pageId }),
    });
    const data = await res.json();
    if (data.ok) {
      box.innerHTML = '<pre style="background:#d1fae5;padding:8px;border-radius:6px;font-size:11px;color:#065f46;">✅ page_id 등록 성공!\n\n' + JSON.stringify(data, null, 2) + '\n\n→ 외부 폰에서 DM 다시 보내면 자동 응답 작동</pre>';
    } else {
      box.innerHTML = '<pre style="background:#fee2e2;padding:8px;border-radius:6px;font-size:11px;color:#991b1b;">❌ ' + JSON.stringify(data) + '</pre>';
    }
  } catch (e) { box.innerHTML = '<pre style="color:#dc2626;">' + e.message + '</pre>'; }
});

document.getElementById('copyAllBtn').addEventListener('click', async () => {
  const text = document.getElementById('results').innerText
    + '\n\n=== webhook 이벤트 ===\n' + (document.getElementById('recentEvents')?.innerText || '(클릭 안 함)')
    + '\n\n=== 구독 활성화 결과 ===\n' + (document.getElementById('subscribeResult')?.innerText || '(클릭 안 함)');
  try {
    await navigator.clipboard.writeText(text);
    alert('✅ 클립보드에 복사됐어요. 붙여넣기로 공유 가능.');
  } catch (e) {
    // 폴백 — textarea 임시 생성 후 복사
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); alert('✅ 복사됨 (legacy)'); } catch(_) { alert('복사 실패: ' + text.length + '자 — 직접 선택해서 복사하세요'); }
    document.body.removeChild(ta);
  }
});

document.getElementById('subscribeBtn').addEventListener('click', async () => {
  const t = localStorage.getItem('itdasy_token::staging') || localStorage.getItem('itdasy_token::prod') || localStorage.getItem('itdasy_token');
  if (!t) { alert('토큰 없음'); return; }
  const box = document.getElementById('subscribeResult');
  box.innerHTML = '<pre>구독 활성화 중…</pre>';
  try {
    const res = await fetch('https://itdasy-backend-staging-644329093453.asia-northeast3.run.app/instagram/dm-reply/subscribe-app', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + t },
    });
    const data = await res.json();
    if (data.ok) {
      box.innerHTML = '<pre style="background:#d1fae5;padding:8px;border-radius:6px;font-size:11px;color:#065f46;">✅ webhook 구독 활성화 성공!\n\n' + JSON.stringify(data, null, 2) + '\n\n→ 외부 폰에서 DM 보내고 30초 후 "🔍 최근 webhook 이벤트 보기" 클릭</pre>';
    } else {
      box.innerHTML = '<pre style="background:#fee2e2;padding:8px;border-radius:6px;font-size:11px;color:#991b1b;">❌ ' + (data.hint || data.error_message || '실패') + '\n\n' + JSON.stringify(data, null, 2) + '</pre>';
    }
  } catch (e) { box.innerHTML = '<pre style="color:#dc2626;">' + e.message + '</pre>'; }
});

document.getElementById('recentBtn').addEventListener('click', async () => {
  const t = localStorage.getItem('itdasy_token::staging') || localStorage.getItem('itdasy_token::prod') || localStorage.getItem('itdasy_token');
  if (!t) { alert('토큰 없음'); return; }
  const box = document.getElementById('recentEvents');
  box.innerHTML = '<pre>불러오는 중…</pre>';
  try {
    const res = await fetch('https://itdasy-backend-staging-644329093453.asia-northeast3.run.app/instagram/dm-reply/recent-events?limit=20', {
      headers: { 'Authorization': 'Bearer ' + t },
    });
    const data = await res.json();
    if (!res.ok) { box.innerHTML = '<pre style="color:#dc2626;">에러: ' + JSON.stringify(data) + '</pre>'; return; }
    if (!data.events || !data.events.length) {
      box.innerHTML = '<pre style="color:#d97706;">⚠️ webhook 이벤트 0건. Meta 가 아직 메시지를 보낸 적 없음.\n\n원인 후보:\n1. Meta Console → Webhooks → Instagram → fields(messages) 구독 안 됨\n2. 인스타 비즈 계정 → 페이스북 페이지 연결 안 됨\n3. App Review 권한 미통과 → Tester 미등록 계정에서 보내면 도착 X\n4. 외부 폰에서 DM 안 보냈음</pre>';
      return;
    }
    box.innerHTML = '<pre style="background:#f3f4f6;padding:8px;border-radius:6px;font-size:10px;max-height:400px;overflow:auto;">' + JSON.stringify(data, null, 2) + '</pre>';
  } catch (e) { box.innerHTML = '<pre style="color:#dc2626;">' + e.message + '</pre>'; }
});
</script>
<script>
document.getElementById('syncIdBtn').addEventListener('click', async () => {
  const t = localStorage.getItem('itdasy_token::staging') || localStorage.getItem('itdasy_token::prod') || localStorage.getItem('itdasy_token');
  if (!t) { alert('토큰 없음'); return; }
  try {
    const res = await fetch('https://itdasy-backend-staging-644329093453.asia-northeast3.run.app/instagram/sync-user-id', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + t },
    });
    const data = await res.json();
    if (res.ok) {
      alert('✅ 동기화 성공!\nIG User ID: ' + data.instagram_user_id + '\nHandle: ' + data.instagram_handle + '\n\n다시 진단 버튼 눌러서 확인하세요.');
    } else {
      alert('❌ 실패 ' + res.status + ':\n' + JSON.stringify(data, null, 2));
    }
  } catch (e) { alert('에러: ' + e.message); }
});

document.getElementById('enableBtn').addEventListener('click', async () => {
  const t = localStorage.getItem('itdasy_token::staging') || localStorage.getItem('itdasy_token::prod') || localStorage.getItem('itdasy_token');
  if (!t) { alert('토큰 없음 — 잇데이 로그인 먼저'); return; }
  try {
    const res = await fetch('https://itdasy-backend-staging-644329093453.asia-northeast3.run.app/instagram/dm-reply/settings', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + t, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        enabled: true,
        tone: 'friendly',
        blocked_keywords: ['환불', '소송', '신고'],
        auto_reply_start: '09:00',
        auto_reply_end: '21:00',
        timezone_name: 'Asia/Seoul',
        template_intro: '안녕하세요! 문의 주셔서 감사해요 😊 사장님이 곧 답변드릴게요.',
        template_pricing: '가격 문의 감사합니다! 자세한 견적은 DM 확인 후 바로 드릴게요.',
        template_booking: '예약 문의 감사해요! 원하시는 날짜와 시간을 남겨주시면 확인드릴게요.',
      }),
    });
    if (res.ok) {
      const data = await res.json();
      alert('✅ DM 자동응답 ON 성공!\n\n다시 진단 버튼 눌러서 user_enabled: true 확인하세요.\n\n' + JSON.stringify(data, null, 2));
    } else {
      const err = await res.text();
      alert('❌ 실패: ' + res.status + '\n' + err);
    }
  } catch (e) {
    alert('에러: ' + e.message);
  }
});
</script>
<script>
const API = 'https://itdasy-backend-staging-644329093453.asia-northeast3.run.app';
const r = document.getElementById('results');
function row(label, value, cls) {
  const d = document.createElement('div');
  d.className = 'row';
  d.innerHTML = '<span class="label">' + label + ':</span> <span class="' + (cls || '') + '">' + value + '</span>';
  r.appendChild(d);
}
function pre(label, value, cls) {
  const d = document.createElement('div');
  d.className = 'row';
  d.innerHTML = '<div class="label ' + (cls || '') + '">' + label + '</div><pre>' + value + '</pre>';
  r.appendChild(d);
}

(async () => {
  // 토큰
  const token = localStorage.getItem('itdasy_token::staging') || localStorage.getItem('itdasy_token::prod') || localStorage.getItem('itdasy_token');
  if (!token) {
    row('⚠️ 토큰 없음', '먼저 잇데이 앱 카카오 로그인 후 다시 이 페이지 방문', 'err');
    return;
  }
  row('토큰', '✅ 있음 (' + token.length + '자)', 'ok');

  // 1. webhook 검증 endpoint 직접 호출 (인증 X)
  try {
    const res = await fetch(API + '/instagram/dm-reply/webhook?hub.mode=subscribe&hub.challenge=PING&hub.verify_token=he8ibHiTzhTOnMoqAldYED2KCcSJHTdbsvPc9iYb3KM');
    const txt = (await res.text()).replace(/^"|"$/g, '');
    row('Webhook verify', res.status + ' ' + (txt === 'PING' ? '✅ challenge 정상' : 'fail (' + txt.substring(0, 30) + ')'), res.status === 200 && txt === 'PING' ? 'ok' : 'err');
  } catch (e) { row('Webhook verify 에러', e.message, 'err'); }

  // 2. /instagram/dm-reply/status (인증)
  try {
    const res = await fetch(API + '/instagram/dm-reply/status', {
      headers: { 'Authorization': 'Bearer ' + token },
    });
    const data = await res.json();
    pre('DM 봇 status', JSON.stringify(data, null, 2), res.ok ? 'ok' : 'err');
    if (data.global_enabled === false) {
      row('DM 전역 활성화', '꺼짐 — Railway DM_AUTOREPLY_ENABLED 확인 필요', 'err');
    }
    if (data.account_ready === false) {
      row('인스타 DM 계정 매칭', '실패 — 인스타 재연동 또는 user_id 동기화 필요 (' + (data.account_ready_reason || 'unknown') + ')', 'err');
    }
    if (data.within_reply_hours === false) {
      row('응답 시간대', '현재 설정 시간 밖이라 자동응답 안 함', 'warn');
    }
  } catch (e) { row('Status 에러', e.message, 'err'); }

  // 3. /instagram/status (인스타 연동 확인)
  try {
    const res = await fetch(API + '/instagram/status', {
      headers: { 'Authorization': 'Bearer ' + token },
    });
    const data = await res.json();
    pre('인스타 연동 status', JSON.stringify(data, null, 2), res.ok ? 'ok' : 'err');
  } catch (e) { row('인스타 status 에러', e.message, 'err'); }

  // 4. /instagram/diagnose (인증 — 자세한 진단)
  try {
    const res = await fetch(API + '/instagram/diagnose', {
      headers: { 'Authorization': 'Bearer ' + token },
    });
    if (res.ok) {
      const data = await res.json();
      pre('인스타 detailed diagnose', JSON.stringify(data, null, 2), 'ok');
    } else if (res.status === 404) {
      row('Diagnose endpoint', 'Not Found (옛 백엔드)', 'warn');
    } else {
      row('Diagnose', res.status, 'warn');
    }
  } catch (e) { row('Diagnose 에러', e.message, 'err'); }

  // [2026-04-29] 5.5 IG 계정의 subscribed_apps 직접 조회 (webhook 진짜 활성인지)
  try {
    const res = await fetch(API + '/instagram/dm-reply/subscriptions', {
      headers: { 'Authorization': 'Bearer ' + token },
    });
    if (res.ok) {
      const data = await res.json();
      const subs = data?.data?.data || [];
      const myFields = subs[0]?.subscribed_fields || [];
      const hasMessages = myFields.includes('messages');
      pre(
        hasMessages ? '✅ IG subscribed_apps' : '❌ IG subscribed_apps (messages 미포함)',
        JSON.stringify(data, null, 2),
        hasMessages ? 'ok' : 'err'
      );
    }
  } catch (e) { row('subscriptions 에러', e.message, 'err'); }

  // [2026-04-29] 6. 최근 webhook 이벤트 (자동 진단에 통합) — 사용자가 외부 DM 보낸 후
  // 잇데이 백엔드에 도착했는지 즉시 표시. 0건이면 Meta 측 문제 (fields 구독·페북 연결·App Mode).
  try {
    const res = await fetch(API + '/instagram/dm-reply/recent-events?limit=20', {
      headers: { 'Authorization': 'Bearer ' + token },
    });
    if (res.ok) {
      const data = await res.json();
      if (!data.events || !data.events.length) {
        pre('⚠️ webhook 이벤트 (최근 30분)', '0건 — Meta 가 메시지를 한 번도 안 보냄.\n\n원인 후보:\n1. Meta App Mode 가 Development → Tester 미등록 외부 계정은 발사 X\n2. 페북 페이지가 Meta App 의 Connected Page 로 등록 안 됨\n3. fields 구독했어도 messages 가 아닌 다른 필드 (comments 등)\n4. webhook URL 이 페북 페이지 webhook 이 아니라 Instagram webhook 인지 (다른 메뉴)', 'err');
      } else {
        pre('✅ webhook 이벤트 (최근 30분 buffer)', JSON.stringify(data.events, null, 2), 'ok');
      }
    } else {
      row('webhook 이벤트', '404 (백엔드 배포 대기 — 1~2분 후 새로고침)', 'warn');
    }
  } catch (e) { row('webhook 이벤트 에러', e.message, 'err'); }

  // 7. ShopSettings 조회 (인스타 user_id 확인)
  // [2026-04-29] has_token 은 GET /shop/settings 가 보안상 token 자체를 노출 안 해서
  // 항상 false 로 표시됐던 오해 신호. 실제 토큰 유무는 dm-reply/status 의
  // instagram_connected + expires_at 으로 판단해야 함.
  try {
    const res = await fetch(API + '/shop/settings', {
      headers: { 'Authorization': 'Bearer ' + token },
    });
    if (res.ok) {
      const data = await res.json();
      const ig = {
        instagram_handle: data.instagram_handle || '(없음)',
        instagram_user_id: data.instagram_user_id || '(없음)',
        // 위 dm-reply/status 의 instagram_connected/expires_at 가 진짜 신호.
        // 본 필드는 schema 에 access_token 없으므로 false 보여도 정상.
        token_field_exposed: '(보안상 미노출 — dm-reply/status 의 expires_at 으로 판단)',
      };
      pre('ShopSettings (IG)', JSON.stringify(ig, null, 2), data.instagram_user_id ? 'ok' : 'err');
    }
  } catch (e) { row('ShopSettings 에러', e.message, 'err'); }

  row('진단 완료', '빨강(err) 항목 = 진짜 원인. 모두 ✅ 인데 응답 안 오면 → Meta Webhook fields 구독 / App Review 권한 확인', 'ok');
})();
</script>
</body>
</html>
