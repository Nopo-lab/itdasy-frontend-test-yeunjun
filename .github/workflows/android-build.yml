name: Android Build (AAB + APK)

# 수동 실행 (Actions 탭에서 Run workflow) — main에 push할 때마다 빌드하면 낭비
on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "빌드 종류"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Install Android packages
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Node + Capacitor
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm deps
        run: npm install --no-audit --no-fund

      - name: Capacitor sync
        run: npx cap sync android

      - name: Gradle permission
        working-directory: android
        run: chmod +x gradlew

      # ── Debug APK 경로 ────────────────────────────────────
      - name: Build Debug APK
        if: ${{ inputs.build_type == 'debug' }}
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      # ── Release AAB 서명 파이프라인 ────────────────────────
      # GitHub Secrets 필요:
      #   ANDROID_KEYSTORE_BASE64  : base64 -i keystore.jks 결과
      #   ANDROID_KEYSTORE_PASSWORD: 키스토어 마스터 비번
      #   ANDROID_KEY_ALIAS        : 키 alias (예: itdasy)
      #   ANDROID_KEY_PASSWORD     : 키 비번
      - name: Decode keystore
        if: ${{ inputs.build_type == 'release' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret 누락 — keystore 먼저 등록해주세요"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/itdasy-release.jks
          echo "Keystore decoded ($(stat -c%s android/app/itdasy-release.jks 2>/dev/null || stat -f%z android/app/itdasy-release.jks) bytes)"

      - name: Inject signing config
        if: ${{ inputs.build_type == 'release' }}
        run: |
          cat >> android/app/build.gradle <<'EOF'

          android {
              signingConfigs {
                  release {
                      storeFile file('itdasy-release.jks')
                      storePassword System.getenv('KEYSTORE_PASSWORD')
                      keyAlias System.getenv('KEY_ALIAS')
                      keyPassword System.getenv('KEY_PASSWORD')
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          EOF

      - name: Build Release AAB (signed)
        if: ${{ inputs.build_type == 'release' }}
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon

      # ── 산출물 업로드 ───────────────────────────────────
      - name: Upload Debug APK
        if: ${{ inputs.build_type == 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: itdasy-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Upload Release AAB
        if: ${{ inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: itdasy-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 90
