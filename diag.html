<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>잇데이 진단</title>
<style>
  body { font-family: -apple-system, sans-serif; padding: 20px; max-width: 480px; margin: 0 auto; background: #f7f7f9; font-size: 14px; }
  h1 { font-size: 18px; color: #B8385A; margin-bottom: 12px; }
  .row { padding: 10px 12px; margin: 6px 0; background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
  .label { font-weight: 700; color: #555; }
  .ok { color: #059669; }
  .err { color: #dc2626; font-weight: 700; }
  .warn { color: #d97706; }
  pre { background: #f3f4f6; padding: 8px; border-radius: 6px; overflow-x: auto; font-size: 11px; white-space: pre-wrap; word-break: break-all; }
  .btn { display: block; width: 100%; padding: 12px; margin-top: 10px; background: #F18091; color: #fff; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>
<h1>잇데이 자동 진단</h1>
<div id="results"></div>
<button class="btn" onclick="location.reload()">다시 진단</button>
<button class="btn" style="background:#888;" onclick="location.href='./'">잇데이로 이동</button>
<script>
const API = 'https://itdasy-backend-staging-644329093453.asia-northeast3.run.app';
const r = document.getElementById('results');
function add(label, value, cls) {
  const div = document.createElement('div');
  div.className = 'row';
  div.innerHTML = '<span class="label">' + label + ':</span> <span class="' + (cls || '') + '">' + value + '</span>';
  r.appendChild(div);
}
function pre(label, value, cls) {
  const div = document.createElement('div');
  div.className = 'row';
  div.innerHTML = '<div class="label ' + (cls || '') + '">' + label + '</div><pre>' + value + '</pre>';
  r.appendChild(div);
}

(async () => {
  add('현재 URL', location.href);
  add('UserAgent', navigator.userAgent.substring(0, 80));
  add('Online', navigator.onLine ? '✅' : '❌ offline', navigator.onLine ? 'ok' : 'err');
  add('Backend URL', API);

  // SW 상태
  if ('serviceWorker' in navigator) {
    const regs = await navigator.serviceWorker.getRegistrations();
    add('서비스워커 수', regs.length);
    for (const reg of regs) {
      if (reg.active) {
        try {
          const ch = new MessageChannel();
          const ver = await new Promise(res => {
            ch.port1.onmessage = (ev) => res(ev.data && ev.data.version);
            reg.active.postMessage({ type: 'GET_VERSION' }, [ch.port2]);
            setTimeout(() => res('timeout'), 2000);
          });
          add('SW CACHE_VERSION', ver, 'ok');
        } catch (e) { add('SW version 조회 실패', e.message, 'err'); }
      }
    }
  } else add('서비스워커', '미지원', 'warn');

  // 토큰
  const tokenKeys = Object.keys(localStorage).filter(k => k.startsWith('itdasy_token'));
  add('토큰 키', tokenKeys.length ? tokenKeys.join(', ') : '없음', tokenKeys.length ? 'ok' : 'warn');
  const token = localStorage.getItem('itdasy_token::staging') || localStorage.getItem('itdasy_token::prod') || localStorage.getItem('itdasy_token');
  if (token) {
    add('토큰 길이', token.length, 'ok');
    try {
      const payload = JSON.parse(atob(token.split('.')[1]));
      const exp = payload.exp ? new Date(payload.exp * 1000).toISOString() : 'no exp';
      const now = Date.now() / 1000;
      const expired = payload.exp && payload.exp < now;
      add('토큰 만료', exp, expired ? 'err' : 'ok');
      add('토큰 user_id', payload.sub, 'ok');
    } catch (e) { add('토큰 파싱 실패', e.message, 'err'); }
  } else add('⚠️ 토큰 없음 — 로그인 필요', '', 'warn');

  // 백엔드 health
  try {
    const t0 = Date.now();
    const res = await fetch(API + '/health');
    const ms = Date.now() - t0;
    add('Backend /health', res.status + ' (' + ms + 'ms)', res.ok ? 'ok' : 'err');
  } catch (e) {
    add('Backend /health 실패', e.message, 'err');
  }

  // 토큰으로 /me 또는 /today/brief
  if (token) {
    try {
      const t0 = Date.now();
      const res = await fetch(API + '/today/brief', { headers: { 'Authorization': 'Bearer ' + token } });
      const ms = Date.now() - t0;
      add('/today/brief (인증)', res.status + ' (' + ms + 'ms)', res.ok ? 'ok' : 'err');
      if (!res.ok) {
        const body = await res.text();
        pre('/today/brief 응답 본문', body.substring(0, 500), 'err');
      }
    } catch (e) {
      pre('/today/brief 호출 실패', e.message + ' / ' + e.name, 'err');
    }

    // /assistant/ask 테스트
    try {
      const t0 = Date.now();
      const res = await fetch(API + '/assistant/ask', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: '진단 테스트' }),
      });
      const ms = Date.now() - t0;
      add('/assistant/ask (인증)', res.status + ' (' + ms + 'ms)', res.ok ? 'ok' : 'err');
      const body = await res.text();
      if (res.ok) pre('/assistant/ask 응답', body.substring(0, 300), 'ok');
      else pre('/assistant/ask 에러 본문', body.substring(0, 500), 'err');
    } catch (e) {
      pre('/assistant/ask 호출 실패', e.message + ' / ' + e.name + ' / ' + (e.stack || '').substring(0, 200), 'err');
    }
  } else {
    add('⚠️ 토큰 없어 인증 endpoint 테스트 스킵', '', 'warn');
  }

  add('진단 완료', '결과 위 내역 확인. 빨강(err) 표시된 게 진짜 원인', 'ok');
})();
</script>
</body>
</html>
